<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Regime Explorer — Interactive (Week 10)</title>

<style>
html, body { margin: 0; padding: 0; background: var(--re-bg); }
:root {
    --re-bg: #fdfbf5;
    --re-text: #1a2332;
    --re-muted: #6b7280;
    --re-border: #d6d3c4;
    --re-card: #fdfbf5;
    --re-pos: #2e7d32;
    --re-neg: #b71c1c;
    --re-mid: #0d47a1;
    --re-accent: #b8860b;
    --re-grey: #5a5a5a;
    --re-early: #2e7d32;
    --re-midcyc: #0d47a1;
    --re-late: #e65100;
    --re-rec: #b71c1c;
}
html[data-theme="dark"] .re-root,
.re-root[data-theme="dark"] {
    --re-bg: #0f1724;
    --re-text: #e6e6e6;
    --re-muted: #9aa3b2;
    --re-border: #2a3441;
    --re-card: #0f1724;
    --re-pos: #66bb6a;
    --re-neg: #ef5350;
    --re-mid: #5a8dee;
    --re-grey: #8a8a8a;
    --re-early: #66bb6a;
    --re-midcyc: #5a8dee;
    --re-late: #ffa040;
    --re-rec: #ef5350;
}
.re-root {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--re-bg);
    color: var(--re-text);
    padding: 12px;
    margin: 0;
}
.re-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--re-card);
    border: 1px solid var(--re-border);
    border-radius: 8px;
}
.re-slider-wrap {
    flex: 1;
    min-width: 260px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    color: var(--re-muted);
}
.re-slider-wrap input[type="range"] {
    flex: 1;
    accent-color: var(--re-accent);
}
.re-slider-wrap .re-y-label {
    white-space: nowrap;
    color: var(--re-text);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-width: 56px;
    text-align: right;
}
.re-presets {
    display: inline-flex;
    border: 1px solid var(--re-border);
    border-radius: 999px;
    overflow: hidden;
    background: var(--re-card);
}
.re-presets button {
    border: none;
    background: transparent;
    color: var(--re-muted);
    padding: 6px 12px;
    font: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
}
.re-presets button:hover { color: var(--re-text); }
.re-presets button.active {
    background: var(--re-accent);
    color: #fff;
}
.re-timeline {
    width: 100%;
    height: 110px;
    background: var(--re-card);
    border-radius: 8px;
    border: 1px solid var(--re-border);
    margin-bottom: 12px;
}
.re-panel {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) 2fr;
    gap: 12px;
    margin-bottom: 12px;
}
.re-summary {
    background: var(--re-card);
    border: 1px solid var(--re-border);
    border-radius: 8px;
    padding: 12px 14px;
}
.re-summary .re-yr {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--re-text);
    font-variant-numeric: tabular-nums;
}
.re-summary .re-tag {
    display: inline-block;
    margin-top: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #fff;
}
.re-tag.re-tag-early   { background: var(--re-early); }
.re-tag.re-tag-mid     { background: var(--re-midcyc); }
.re-tag.re-tag-late    { background: var(--re-late); }
.re-tag.re-tag-recession { background: var(--re-rec); }
.re-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-top: 10px;
}
.re-stat {
    background: var(--re-card);
    border: 1px solid var(--re-border);
    border-left: 4px solid var(--re-muted);
    border-radius: 6px;
    padding: 8px 10px;
}
.re-stat.re-stat-stocks { border-left-color: var(--re-neg); }
.re-stat.re-stat-bonds  { border-left-color: var(--re-mid); }
.re-stat.re-stat-cash   { border-left-color: var(--re-grey); }
.re-stat.re-stat-gold   { border-left-color: var(--re-accent); }
.re-stat .re-stat-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--re-muted);
}
.re-stat .re-stat-val {
    font-size: 1.1rem;
    font-weight: 700;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
}
.re-chart {
    width: 100%;
    height: 360px;
    background: var(--re-card);
    border-radius: 8px;
    border: 1px solid var(--re-border);
}
.re-caption {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--re-muted);
    line-height: 1.45;
}
@media (max-width: 760px) {
    .re-panel { grid-template-columns: 1fr; }
    .re-stats { grid-template-columns: repeat(2, 1fr); }
    .re-chart { height: 320px; }
}
</style>
</head>

            case "late":      return T.tag_late;
            case "recession": return T.tag_recession;

        let s = 0, b = 0, t = 0, g = 0, n = 0;

            "mid":       getCssVar("--re-midcyc"),
            "late":      getCssVar("--re-late"),
            "recession": getCssVar("--re-rec"),
        };

        const xs = YEARS;
        const ys = REGIME.map(_ => 1);
        const colors = REGIME.map(r => palette[r] || colorMuted);
        const text = YEARS.map((y, i) =>
            `${y} \u2014 ${tagText(REGIME[i])}`);

        const trace = {
            x: xs,
            y: ys,
            type: "bar",
            marker: { color: colors, line: { width: 0 } },
            width: 0.92,
            customdata: REGIME,
            hovertemplate: "%{text}<extra></extra>",
            text: text,
            textposition: "none",
        };

        const layout = {
            margin: { l: 30, r: 18, t: 22, b: 30 },
            paper_bgcolor: colorBg,
            plot_bgcolor: colorBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif",
                    color: colorText, size: 11 },
            bargap: 0.0,
            xaxis: {
                tickmode: "array",
                tickvals: [1930,1940,1950,1960,1970,1980,1990,2000,2010,2020],
                color: colorText,
                gridcolor: colorGrid,
                showline: false,
                title: { text: T.timeline_title,
                         font: { color: colorMuted, size: 10 } },
            },
            yaxis: {
                visible: false, range: [0, 1.05],
            },
            shapes: [{
                type: "line", xref: "x", yref: "paper",
                x0: year, x1: year, y0: 0, y1: 1.0,
                line: { color: colorText, width: 2.5 },
            }],
            showlegend: false,
        };

        Plotly.react(TL, [trace], layout, {
            displayModeBar: false, responsive: true,
        });
        TL.removeAllListeners && TL.removeAllListeners("plotly_click");
        TL.on("plotly_click", function (ev) {
            if (!ev || !ev.points || !ev.points.length) return;
            const yr = Math.round(ev.points[0].x);
            if (yr >= Y0 && yr <= Y1) {
                year = yr;
                SLIDER.value = String(yr);
                refreshAll();
            }
        });
    }

    function renderRegimeChart() {
        const i = idxOf(year);
        const tag = REGIME[i];
        const avg = avgForRegime(tag);

        const colorText = getCssVar("--re-text");
        const colorMuted = getCssVar("--re-muted");
        const colorBg = getCssVar("--re-card");
        const colorGrid = darkMode() ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";
        const colorNeg = getCssVar("--re-neg");
        const colorMid = getCssVar("--re-mid");
        const colorGrey = getCssVar("--re-grey");
        const colorAcc = getCssVar("--re-accent");

        const labels = [T.short_stocks, T.short_bonds, T.short_cash, T.short_gold];
        const colors = [colorNeg, colorMid, colorGrey, colorAcc];
        const avgVals = [avg.stocks, avg.bonds, avg.cash, avg.gold];

        // Forward 1-year (year y -> y+1). For year == Y1 we use the same year
        // (no forward data) so we just show that year's return.
        const fi = (i + 1 <= REGIME.length - 1) ? (i + 1) : i;
        const fy = YEARS[fi];
        const fwdVals = [SP500[fi], TBOND[fi], TBILL[fi], GOLD[fi]];

        const traces = [
            {
                x: labels,
                y: fwdVals,
                type: "bar",
                name: T.forward_label.replace("{y}", year).replace("{y1}", fy),
                marker: { color: colors, opacity: 0.95, line: { width: 0 } },
                text: fwdVals.map(v => pct(v)),
                textposition: "outside",
                textfont: { color: colorText, size: 11 },
                offsetgroup: "fwd",
            },
            {
                x: labels,
                y: avgVals,
                type: "bar",
                name: T.chart_title.replace("{tag}", tagText(tag)).replace("{n}", avg.n),
                marker: { color: colors, opacity: 0.35, line: { width: 0 } },
                text: avgVals.map(v => pct(v)),
                textposition: "outside",
                textfont: { color: colorMuted, size: 10 },
                offsetgroup: "avg",
            },
        ];

        const layout = {
            margin: { l: 56, r: 18, t: 36, b: 60 },
            paper_bgcolor: colorBg,
            plot_bgcolor: colorBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif",
                    color: colorText, size: 12 },
            barmode: "group",
            bargap: 0.18,
            bargroupgap: 0.08,
            xaxis: {
                title: { text: T.chart_xtitle,
                         font: { color: colorMuted, size: 11 } },
                color: colorText,
                gridcolor: colorGrid,
            },
            yaxis: {
                title: { text: T.chart_ytitle,
                         font: { color: colorMuted, size: 11 } },
                color: colorText,
                gridcolor: colorGrid,
                zerolinecolor: colorMuted,
                tickformat: ".0%",
            },
            legend: {
                orientation: "h", x: 0, y: -0.25,
                font: { color: colorText, size: 10 },
                bgcolor: "rgba(0,0,0,0)",
            },
            hovermode: "closest",
        };

        Plotly.react(CHART, traces, layout, {
            displayModeBar: false, responsive: true,
        });
    }

    function refreshSummary() {
        const i = idxOf(year);
        const tag = REGIME[i];
        const fi = (i + 1 <= REGIME.length - 1) ? (i + 1) : i;

        document.getElementById("re-year-num").textContent = String(year);
        const tagEl = document.getElementById("re-year-tag");
        tagEl.textContent = tagText(tag);
        tagEl.className = "re-tag re-tag-" + tag;

        document.getElementById("re-name-stocks").textContent = T.short_stocks;
        document.getElementById("re-name-bonds").textContent = T.short_bonds;
        document.getElementById("re-name-cash").textContent = T.short_cash;
        document.getElementById("re-name-gold").textContent = T.short_gold;

        document.getElementById("re-val-stocks").textContent = pct(SP500[fi]);
        document.getElementById("re-val-bonds").textContent = pct(TBOND[fi]);
        document.getElementById("re-val-cash").textContent = pct(TBILL[fi]);
        document.getElementById("re-val-gold").textContent = pct(GOLD[fi]);
    }

    function refreshAll() {
        Y_VALUE.textContent = String(year);
        refreshSummary();
        renderTimeline();
        renderRegimeChart();
        // preset highlighting
        PRESETS.querySelectorAll("button").forEach(b => {
            b.classList.toggle("active", parseInt(b.dataset.y, 10) === year);
        });
    }

    PRESETS.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            year = parseInt(btn.dataset.y, 10);
            SLIDER.value = String(year);
            refreshAll();
        });
    });
    SLIDER.addEventListener("input", () => {
        year = parseInt(SLIDER.value, 10);
        refreshAll();
    });

    function applyI18n() {
        document.getElementById("re-slider-label").textContent = T.slider_label;
        document.getElementById("re-caption").textContent = T.caption;
    }
    applyI18n();
    refreshAll();

    function reportHeight() {
        try {
            var h = Math.ceil(document.documentElement.scrollHeight);
            parent.postMessage({ type: 'lesson-interactive-resize', height: h }, '*');
        } catch (e) { /* ignore */ }
    }
    if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(reportHeight).observe(document.body);
    }
    window.addEventListener('resize', reportHeight);
    setTimeout(reportHeight, 50);
    setTimeout(reportHeight, 500);

    const themeObserver = new MutationObserver(refreshAll);
    themeObserver.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["data-theme"],
    });
})();
</script>

</body>
</html>
