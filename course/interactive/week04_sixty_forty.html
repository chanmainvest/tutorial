<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>60/40 Lab — Interactive (Week 4)</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
html, body { margin: 0; padding: 0; background: var(--sf-bg); }
:root {
    --sf-bg: #fdfbf5;
    --sf-text: #1a2332;
    --sf-muted: #6b7280;
    --sf-border: #d6d3c4;
    --sf-card: #fdfbf5;
    --sf-pos: #2e7d32;
    --sf-neg: #b71c1c;
    --sf-mid: #0d47a1;
    --sf-accent: #b8860b;
}
html[data-theme="dark"] .sf-root,
.sf-root[data-theme="dark"] {
    --sf-bg: #0f1724;
    --sf-text: #e6e6e6;
    --sf-muted: #9aa3b2;
    --sf-border: #2a3441;
    --sf-card: #0f1724;
    --sf-pos: #66bb6a;
    --sf-neg: #ef5350;
    --sf-mid: #5a8dee;
}
.sf-root {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--sf-bg);
    color: var(--sf-text);
    padding: 12px;
    margin: 0;
}
.sf-controls {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
    padding: 12px;
    background: var(--sf-card);
    border: 1px solid var(--sf-border);
    border-radius: 8px;
}
.sf-block {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--sf-muted);
}
.sf-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
}
.sf-val {
    color: var(--sf-text);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
}
.sf-block input[type="range"] {
    width: 100%;
    accent-color: var(--sf-accent);
}
.sf-mix {
    font-size: 0.78rem;
    color: var(--sf-muted);
    font-variant-numeric: tabular-nums;
}
.sf-mix .sf-mix-s { color: var(--sf-accent); font-weight: 700; }
.sf-mix .sf-mix-b { color: var(--sf-mid); font-weight: 700; }
.sf-toggle {
    display: inline-flex;
    border: 1px solid var(--sf-border);
    border-radius: 999px;
    overflow: hidden;
    background: var(--sf-card);
    align-self: flex-start;
}
.sf-toggle button {
    border: none;
    background: transparent;
    color: var(--sf-muted);
    padding: 6px 14px;
    font: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
}
.sf-toggle button:hover { color: var(--sf-text); }
.sf-toggle.sf-toggle-rb button.active {
    background: var(--sf-accent);
    color: #fff;
}
.sf-toggle.sf-toggle-rl button.active {
    background: var(--sf-mid);
    color: #fff;
}
.sf-charts {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}
.sf-chart {
    width: 100%;
    background: var(--sf-card);
    border-radius: 8px;
    border: 1px solid var(--sf-border);
}
.sf-chart-w { height: 320px; }
.sf-chart-d { height: 220px; }
.sf-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 12px;
}
.sf-stat {
    background: var(--sf-card);
    border: 1px solid var(--sf-border);
    border-left: 4px solid var(--sf-muted);
    border-radius: 8px;
    padding: 10px 12px;
}
.sf-stat.sf-stat-pos { border-left-color: var(--sf-pos); }
.sf-stat.sf-stat-neg { border-left-color: var(--sf-neg); }
.sf-stat.sf-stat-mid { border-left-color: var(--sf-mid); }
.sf-stat.sf-stat-acc { border-left-color: var(--sf-accent); }
.sf-stat .sf-stat-name {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--sf-muted);
}
.sf-stat .sf-stat-val {
    font-size: 1.35rem;
    font-weight: 700;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
}
.sf-stat .sf-stat-detail {
    font-size: 0.78rem;
    color: var(--sf-muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
}
.sf-caption {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--sf-muted);
    line-height: 1.45;
}
@media (max-width: 720px) {
    .sf-controls { grid-template-columns: 1fr; }
    .sf-stats { grid-template-columns: repeat(2, 1fr); }
    .sf-chart-w { height: 260px; }
    .sf-chart-d { height: 180px; }
}
</style>
</head>

<div class="sf-root" id="sf-root">

        <div class="sf-block">
            <div class="sf-row">
                <span id="sf-lab-w">Stock weight</span>

            <div class="sf-mix">

            </div>
        </div>
        <div class="sf-block">
            <span id="sf-lab-rb">Rebalance</span>
            <div class="sf-toggle sf-toggle-rb" id="sf-toggle-rb" role="tablist">
                <button type="button" data-rb="annual" class="active" id="sf-rb-annual">Annually</button>
                <button type="button" data-rb="never" id="sf-rb-never">Never</button>
            </div>
        </div>
        <div class="sf-block">
            <span id="sf-lab-rl">Returns</span>
            <div class="sf-toggle sf-toggle-rl" id="sf-toggle-rl" role="tablist">

    </div>
    <div class="sf-charts">

    <div class="sf-stats">

        </div>
        <div class="sf-stat sf-stat-mid">
            <div class="sf-stat-name" id="sf-name-vol">Volatility (ann)</div>
            <div class="sf-stat-val" id="sf-val-vol">—</div>
            <div class="sf-stat-detail" id="sf-det-vol">—</div>
        </div>
        <div class="sf-stat sf-stat-neg">
            <div class="sf-stat-name" id="sf-name-dd">Max drawdown</div>
            <div class="sf-stat-val" id="sf-val-dd">—</div>
            <div class="sf-stat-detail" id="sf-det-dd">—</div>
        </div>
        <div class="sf-stat sf-stat-acc">
            <div class="sf-stat-name" id="sf-name-sh">Sharpe</div>
            <div class="sf-stat-val" id="sf-val-sh">—</div>
            <div class="sf-stat-detail" id="sf-det-sh">—</div>
        </div>
    </div>
    <p class="sf-caption" id="sf-caption">
        Damodaran 1928-2024 annual data. Slide stock weight in 10% steps; toggle annual rebalancing vs buy-and-hold; toggle real vs nominal returns.
    </p>
</div>

    }
    function darkMode() {
        return document.documentElement.getAttribute("data-theme") === "dark";
    }
    function realize(r, cpi) { return (1 + r) / (1 + cpi) - 1; }

    function buildSeries() {
        const n = SP500.length;
        const sp = new Array(n);
        const bd = new Array(n);
        const rf = new Array(n);
        for (let i = 0; i < n; i++) {
            if (useReal) {
                sp[i] = realize(SP500[i], CPI[i]);
                bd[i] = realize(TBOND[i], CPI[i]);
                rf[i] = realize(TBILL[i], CPI[i]);
            } else {
                sp[i] = SP500[i];
                bd[i] = TBOND[i];
                rf[i] = TBILL[i];
            }
        }
        return { sp, bd, rf, n };
    }

        const { sp, bd, rf, n } = buildSeries();
        const xs = [YEARS[0] - 1];
        const wealth = [1.0];

        const rfRet = [];

                v *= (1 + r);
                wealth.push(v);
                xs.push(YEARS[i]);
                portRet.push(r);
                rfRet.push(rf[i]);
            }
        } else {
            let s_v = target;
            let b_v = 1 - target;
            let prev = 1.0;
            for (let i = 0; i < n; i++) {
                s_v *= (1 + sp[i]);
                b_v *= (1 + bd[i]);
                const tot = s_v + b_v;
                const r = tot / prev - 1;
                prev = tot;
                wealth.push(tot);
                xs.push(YEARS[i]);
                portRet.push(r);
                rfRet.push(rf[i]);
            }
        }
        return { xs, wealth, portRet, rfRet, n };
    }

    function maxDD(wealth) {
        let peak = wealth[0];
        let dd = 0;
        const path = new Array(wealth.length);
        for (let i = 0; i < wealth.length; i++) {
            if (wealth[i] > peak) peak = wealth[i];
            const d = wealth[i] / peak - 1;
            path[i] = d;
            if (d < dd) dd = d;
        }
        return { dd, path };
    }

    function mean(a) {
        let s = 0;
        for (let i = 0; i < a.length; i++) s += a[i];
        return a.length ? s / a.length : 0;
    }
    function stdev(a) {
        if (a.length < 2) return 0;
        const m = mean(a);
        let s = 0;
        for (let i = 0; i < a.length; i++) { const d = a[i] - m; s += d * d; }
        return Math.sqrt(s / (a.length - 1));
    }

    function pct(v, dec) {
        if (!isFinite(v)) return "—";
        const d = (dec === undefined) ? 1 : dec;
        const sign = v >= 0 ? "+" : "";
        return sign + (v * 100).toFixed(d) + "%";
    }
    function pctNoSign(v, dec) {
        if (!isFinite(v)) return "—";
        const d = (dec === undefined) ? 1 : dec;
        return (v * 100).toFixed(d) + "%";
    }

    function render() {
        const sim = simulate();
        const { xs, wealth, portRet, rfRet, n } = sim;
        const cagr = Math.pow(wealth[wealth.length - 1], 1 / n) - 1;
        const ddInfo = maxDD(wealth);
        const vol = stdev(portRet);
        const excess = portRet.map((r, i) => r - rfRet[i]);
        const sharpe = stdev(excess) > 0 ? mean(excess) / stdev(excess) : NaN;

        const colorPos = getCssVar("--sf-pos");
        const colorNeg = getCssVar("--sf-neg");
        const colorMid = getCssVar("--sf-mid");
        const colorAcc = getCssVar("--sf-accent");
        const colorText = getCssVar("--sf-text");
        const colorMuted = getCssVar("--sf-muted");
        const colorGrid = darkMode() ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";
        const colorBg = getCssVar("--sf-card");
        const fillNeg = darkMode() ? "rgba(239,83,80,0.25)" : "rgba(183,28,28,0.18)";

        // Top: cumulative wealth on log scale.
        const wTrace = {
            x: xs, y: wealth,
            mode: "lines",
            line: { color: colorAcc, width: 2 },
            name: "Wealth",
            hovertemplate: "%{x}: $%{y:,.2f}<extra></extra>",
        };
        const layoutW = {
            margin: { l: 64, r: 24, t: 36, b: 30 },
            paper_bgcolor: colorBg,
            plot_bgcolor: colorBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif", color: colorText, size: 11 },
            title: { text: T.chart_w_t, font: { color: colorText, size: 12 }, x: 0.01, xanchor: "left" },
            xaxis: { gridcolor: colorGrid, color: colorText, zerolinecolor: colorGrid },
            yaxis: {
                title: { text: T.chart_w_y, font: { color: colorMuted, size: 10 } },
                gridcolor: colorGrid, color: colorText, zerolinecolor: colorGrid,
                type: "log",
                tickformat: "$,.0f",
            },
            showlegend: false,
            hovermode: "x unified",
        };

        // Bottom: drawdown.
        const dTrace = {
            x: xs, y: ddInfo.path.map(v => v * 100),
            mode: "lines",
            line: { color: colorNeg, width: 1.5 },
            fill: "tozeroy",
            fillcolor: fillNeg,
            name: "DD",
            hovertemplate: "%{x}: %{y:.1f}%<extra></extra>",
        };
        const layoutD = {
            margin: { l: 64, r: 24, t: 36, b: 36 },
            paper_bgcolor: colorBg,
            plot_bgcolor: colorBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif", color: colorText, size: 11 },
            title: { text: T.chart_d_t, font: { color: colorText, size: 12 }, x: 0.01, xanchor: "left" },
            xaxis: { gridcolor: colorGrid, color: colorText, zerolinecolor: colorGrid },
            yaxis: {
                title: { text: T.chart_d_y, font: { color: colorMuted, size: 10 } },
                gridcolor: colorGrid, color: colorText, zerolinecolor: colorMuted,
                ticksuffix: "%",
                rangemode: "nonpositive",
            },
            showlegend: false,
            hovermode: "x unified",
        };

        Plotly.react(CHART_W, [wTrace], layoutW, { displayModeBar: false, responsive: true });
        Plotly.react(CHART_D, [dTrace], layoutD, { displayModeBar: false, responsive: true });

        // stats
        const basis = useReal ? T.real_basis : T.nom_basis;
        const rbLbl = rebalance === "annual" ? T.ann_rb : T.no_rb;
        const finalV = wealth[wealth.length - 1];
        document.getElementById("sf-val-cagr").textContent = pct(cagr, 2);
        document.getElementById("sf-det-cagr").textContent = basis + " \u00b7 " + n + " " + T.yrs;
        document.getElementById("sf-val-vol").textContent = pctNoSign(vol, 1);
        document.getElementById("sf-det-vol").textContent = rbLbl;
        document.getElementById("sf-val-dd").textContent = pct(ddInfo.dd, 1);
        document.getElementById("sf-det-dd").textContent = T.ending_lbl + " $" + finalV.toFixed(2);
        document.getElementById("sf-val-sh").textContent = isFinite(sharpe) ? sharpe.toFixed(2) : "—";
        document.getElementById("sf-det-sh").textContent = T.rf_lbl;

        reportHeight();
    }

    function updateLabels() {
        const w = Math.round(target * 100);
        VAL_W.textContent = w + "%";
        MIX_S.textContent = w + "%";
        MIX_B.textContent = (100 - w) + "%";
    }

    SLIDER_W.addEventListener("input", () => {
        target = parseInt(SLIDER_W.value, 10) / 100;
        updateLabels();
        render();
    });
    TOGGLE_RB.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            TOGGLE_RB.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            rebalance = btn.dataset.rb;
            render();
        });
    });
    TOGGLE_RL.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            TOGGLE_RL.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            useReal = btn.dataset.real === "true";
            render();
        });
    });

    function applyI18n() {
        document.getElementById("sf-lab-w").textContent = T.lab_w;
        document.getElementById("sf-lab-rb").textContent = T.lab_rb;
        document.getElementById("sf-lab-rl").textContent = T.lab_rl;
        document.getElementById("sf-lab-stocks").textContent = T.lab_stocks;
        document.getElementById("sf-lab-bonds").textContent = T.lab_bonds;
        document.getElementById("sf-rb-annual").textContent = T.rb_annual;
        document.getElementById("sf-rb-never").textContent = T.rb_never;
        document.getElementById("sf-rl-real").textContent = T.rl_real;
        document.getElementById("sf-rl-nom").textContent = T.rl_nom;
        document.getElementById("sf-name-cagr").textContent = T.name_cagr;
        document.getElementById("sf-name-vol").textContent = T.name_vol;
        document.getElementById("sf-name-dd").textContent = T.name_dd;
        document.getElementById("sf-name-sh").textContent = T.name_sh;
        document.getElementById("sf-caption").textContent = T.caption;
    }
    applyI18n();
    updateLabels();

    function reportHeight() {
        try {
            var h = Math.ceil(document.documentElement.scrollHeight);
            parent.postMessage({ type: 'lesson-interactive-resize', height: h }, '*');
        } catch (e) { /* ignore */ }
    }
    if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(reportHeight).observe(document.body);
    }
    window.addEventListener('resize', reportHeight);
    setTimeout(reportHeight, 50);
    setTimeout(reportHeight, 500);

    const themeObserver = new MutationObserver(render);
    themeObserver.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["data-theme"],
    });

    render();
})();
</script>

</body>
