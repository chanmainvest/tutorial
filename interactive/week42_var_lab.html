<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaR Lab — Interactive (Week 42)</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
html, body { margin: 0; padding: 0; background: var(--vr-bg); }
:root {
    --vr-bg: #fdfbf5;
    --vr-text: #1a2332;
    --vr-muted: #6b7280;
    --vr-border: #d6d3c4;
    --vr-card: #fdfbf5;
    --vr-pos: #2e7d32;
    --vr-neg: #b71c1c;
    --vr-mid: #0d47a1;
    --vr-accent: #b8860b;
    --vr-purple: #6a1b9a;
}
html[data-theme="dark"] .vr-root,
.vr-root[data-theme="dark"] {
    --vr-bg: #0f1724;
    --vr-text: #e6e6e6;
    --vr-muted: #9aa3b2;
    --vr-border: #2a3441;
    --vr-card: #0f1724;
    --vr-pos: #66bb6a;
    --vr-neg: #ef5350;
    --vr-mid: #5a8dee;
    --vr-purple: #b67ad9;
}
.vr-root {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--vr-bg);
    color: var(--vr-text);
    padding: 12px;
    margin: 0;
}
.vr-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--vr-card);
    border: 1px solid var(--vr-border);
    border-radius: 8px;
}
.vr-pillrow {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 0.78rem;
    color: var(--vr-muted);
}
.vr-pillrow .vr-pillrow-label {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 0.72rem;
}
.vr-pills {
    display: inline-flex;
    border: 1px solid var(--vr-border);
    border-radius: 999px;
    overflow: hidden;
    background: var(--vr-card);
}
.vr-pills button {
    border: none;
    background: transparent;
    color: var(--vr-muted);
    padding: 6px 10px;
    font: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
}
.vr-pills button:hover { color: var(--vr-text); }
.vr-pills button.active {
    background: var(--vr-accent);
    color: #fff;
}
.vr-pills.vr-method button.active {
    background: var(--vr-mid);
}
.vr-slider-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 0.78rem;
    color: var(--vr-muted);
}
.vr-slider-wrap .vr-slider-head {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 0.72rem;
}
.vr-slider-wrap .vr-slider-val {
    color: var(--vr-text);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    text-transform: none;
}
.vr-slider-wrap input[type="range"] {
    width: 100%;
    accent-color: var(--vr-accent);
}
.vr-slider-wrap input[type="number"] {
    width: 100%;
    background: var(--vr-card);
    color: var(--vr-text);
    border: 1px solid var(--vr-border);
    border-radius: 6px;
    padding: 4px 8px;
    font: inherit;
    font-size: 0.85rem;
    font-variant-numeric: tabular-nums;
}
.vr-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 12px;
}
@media (max-width: 820px) { .vr-grid { grid-template-columns: 1fr; } }
.vr-chart {
    width: 100%;
    height: 320px;
    background: var(--vr-card);
    border-radius: 8px;
    border: 1px solid var(--vr-border);
}
.vr-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-top: 12px;
}
.vr-stat {
    background: var(--vr-card);
    border: 1px solid var(--vr-border);
    border-left: 4px solid var(--vr-muted);
    border-radius: 8px;
    padding: 8px 10px;
}
.vr-stat-neg { border-left-color: var(--vr-neg); }
.vr-stat-pur { border-left-color: var(--vr-purple); }
.vr-stat-mid { border-left-color: var(--vr-mid); }
.vr-stat-acc { border-left-color: var(--vr-accent); }
.vr-stat-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--vr-muted);
}
.vr-stat-val {
    font-size: 1.25rem;
    font-weight: 700;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
}
.vr-stat-detail {
    font-size: 0.72rem;
    color: var(--vr-muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
}
.vr-caption {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--vr-muted);
    line-height: 1.45;
}
.vr-hidden { display: none; }
@media (max-width: 640px) {
    .vr-stats { grid-template-columns: repeat(2, 1fr); }
    .vr-chart { height: 280px; }
}
</style>
</head>
<body>

<div class="vr-root" id="vr-root">

    <div class="vr-controls">
        <div class="vr-slider-wrap">
            <div class="vr-slider-head">
                <span id="vr-pv-label">Portfolio value</span>
                <span class="vr-slider-val" id="vr-pv-val">$1,000,000</span>
            </div>
            <input type="number" id="vr-pv" min="1000" max="100000000" step="10000" value="1000000">
        </div>
        <div class="vr-slider-wrap">
            <div class="vr-slider-head">
                <span id="vr-vol-label">Annual volatility</span>
                <span class="vr-slider-val" id="vr-vol-val">18%</span>
            </div>
            <input type="range" id="vr-vol" min="5" max="40" step="0.5" value="18">
        </div>
        <div class="vr-pillrow">
            <span class="vr-pillrow-label" id="vr-conf-label">Confidence</span>
            <div class="vr-pills" id="vr-conf-pills">
                <button type="button" data-c="0.90">90%</button>
                <button type="button" data-c="0.95">95%</button>
                <button type="button" data-c="0.99" class="active">99%</button>
                <button type="button" data-c="0.995">99.5%</button>
                <button type="button" data-c="0.999">99.9%</button>
            </div>
        </div>
        <div class="vr-pillrow">
            <span class="vr-pillrow-label" id="vr-method-label">Method</span>
            <div class="vr-pills vr-method" id="vr-method-pills">
                <button type="button" data-m="normal" class="active">Normal</button>
                <button type="button" data-m="t">Student-t</button>
                <button type="button" data-m="hist">Historical</button>
            </div>
        </div>
        <div class="vr-slider-wrap" id="vr-df-wrap">
            <div class="vr-slider-head">
                <span id="vr-df-label">Degrees of freedom (t)</span>
                <span class="vr-slider-val" id="vr-df-val">5</span>
            </div>
            <input type="range" id="vr-df" min="3" max="30" step="1" value="5">
        </div>
    </div>

    <div class="vr-grid">
        <div id="vr-bar-chart" class="vr-chart"></div>
        <div id="vr-hist-chart" class="vr-chart"></div>
    </div>

    <div class="vr-stats">
        <div class="vr-stat vr-stat-neg">
            <div class="vr-stat-name" id="vr-name-var1d">1-day VaR</div>
            <div class="vr-stat-val" id="vr-val-var1d">—</div>
            <div class="vr-stat-detail" id="vr-det-var1d">—</div>
        </div>
        <div class="vr-stat vr-stat-pur">
            <div class="vr-stat-name" id="vr-name-cvar1d">1-day CVaR</div>
            <div class="vr-stat-val" id="vr-val-cvar1d">—</div>
            <div class="vr-stat-detail" id="vr-det-cvar1d">—</div>
        </div>
        <div class="vr-stat vr-stat-mid">
            <div class="vr-stat-name" id="vr-name-var1m">1-month VaR</div>
            <div class="vr-stat-val" id="vr-val-var1m">—</div>
            <div class="vr-stat-detail" id="vr-det-var1m">—</div>
        </div>
        <div class="vr-stat vr-stat-acc">
            <div class="vr-stat-name" id="vr-name-ratio">CVaR / VaR</div>
            <div class="vr-stat-val" id="vr-val-ratio">—</div>
            <div class="vr-stat-detail" id="vr-det-ratio">—</div>
        </div>
    </div>

    <p class="vr-caption" id="vr-caption">
        Portfolio loss measures under three methods. Switch confidence and method to compare.
    </p>
</div>

    const Z_TABLE = {

    // Standard Normal PDF
    function normPdf(x) { return Math.exp(-0.5*x*x) / Math.sqrt(2*Math.PI); }

    // ---------------- Deterministic LCG + Box-Muller for reproducible Student-t samples
    function makeRng(seed) {
        let s = seed >>> 0;
        return function() {
            s = (s * 1664525 + 1013904223) >>> 0;
            return (s & 0x7fffffff) / 0x7fffffff;
        };
    }
    function boxMuller(rnd) {
        let u = 0, v = 0;
        while (u === 0) u = rnd();
        while (v === 0) v = rnd();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    }

    // t = Z / sqrt(W/df) where W ~ chi2(df) = sum of df squared normals.
    // Variance of t = df/(df-2).  We'll later divide by sqrt(df/(df-2)) to get unit variance.
    function tSamples(df, n, seed) {
        const rnd = makeRng(seed);
        const out = new Float64Array(n);
        const scale = 1 / Math.sqrt(df / (df - 2));
        for (let i = 0; i < n; i++) {
            const z = boxMuller(rnd);
            let w = 0;
            for (let j = 0; j < df; j++) {

            out[i] = (z / Math.sqrt(w / df)) * scale;

        const lo = Math.floor(pos);

        if (lo === hi) return sortedArr[lo];
        return sortedArr[lo] + (pos - lo) * (sortedArr[hi] - sortedArr[lo]);

        document.getElementById("vr-pv-label").textContent = T.pv_label;
        document.getElementById("vr-vol-label").textContent = T.vol_label;
        document.getElementById("vr-conf-label").textContent = T.conf_label;
        document.getElementById("vr-method-label").textContent = T.method_label;
        document.getElementById("vr-df-label").textContent = T.df_label;
        const mb = METHOD_PILLS.querySelectorAll("button");
        mb[0].textContent = T.normal;
        mb[1].textContent = T.t_dist;
        mb[2].textContent = T.hist;
        document.getElementById("vr-name-var1d").textContent = T.name_var1d;
        document.getElementById("vr-name-cvar1d").textContent = T.name_cvar1d;
        document.getElementById("vr-name-var1m").textContent = T.name_var1m;
        document.getElementById("vr-name-ratio").textContent = T.name_ratio;
        document.getElementById("vr-caption").textContent = T.caption;
    }

    function updatePVLabel() {
        PV_VAL.textContent = fmtUSDfull(portfolio);
    }
    function updateVolLabel() {
        VOL_VAL.textContent = (volAnnual * 100).toFixed(1) + "%";
    }
    function updateDFLabel() {
        DF_VAL.textContent = String(dfT);
    }
    function updateDFVisible() {
        DF_WRAP.classList.toggle("vr-hidden", method !== "t");
    }

    function renderBarChart() {
        const sigmaD = volAnnual / Math.sqrt(252);
        const n = varCvar("normal", conf, sigmaD, dfT);
        const t = varCvar("t",      conf, sigmaD, dfT);
        const h = varCvar("hist",   conf, sigmaD, dfT);
        const labels = [T.bar_normal, T.bar_t.replace("{df}", dfT), T.bar_hist];
        const vals = [n.v * portfolio, t.v * portfolio, h.v * portfolio];
        const colors = [getCssVar("--vr-mid"), getCssVar("--vr-purple"), getCssVar("--vr-accent")];
        // Highlight active method by alpha
        const opa = labels.map((_, i) => {
            const m = ["normal", "t", "hist"][i];
            return m === method ? 1.0 : 0.45;
        });
        const fillColors = colors.map((c, i) => c);
        const cText = getCssVar("--vr-text");
        const cMuted = getCssVar("--vr-muted");
        const cBg = getCssVar("--vr-card");
        const cGrid = darkMode() ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";
        const traces = [{
            type: "bar",
            x: labels,
            y: vals,
            marker: { color: fillColors, opacity: opa, line: { width: 0 } },
            text: vals.map(v => fmtUSDfull(v)),
            textposition: "outside",
            textfont: { color: cText, size: 12 },
            hovertemplate: "%{x}<br>1-day VaR = %{y:$,.0f}<extra></extra>",
        }];
        const layout = {
            margin: { l: 70, r: 16, t: 56, b: 44 },
            paper_bgcolor: cBg,
            plot_bgcolor: cBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif", color: cText, size: 12 },
            title: { text: T.bar_title, font: { color: cText, size: 13 }, x: 0, xanchor: "left" },
            xaxis: { color: cText, gridcolor: cGrid },
            yaxis: { title: { text: T.bar_y, font: { color: cMuted, size: 11 } },
                     gridcolor: cGrid, color: cText, tickformat: "$,.0f" },
            showlegend: false,
        };
        Plotly.react(BAR, traces, layout, { displayModeBar: false, responsive: true });
    }

    function renderHist() {
        const cBg = getCssVar("--vr-card");
        const cText = getCssVar("--vr-text");
        const cMuted = getCssVar("--vr-muted");
        const cNeg = getCssVar("--vr-neg");
        const cMid = getCssVar("--vr-mid");
        const cAcc = getCssVar("--vr-accent");
        const cGrid = darkMode() ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";

        const sigmaD = volAnnual / Math.sqrt(252);
        const res = varCvar(method, conf, sigmaD, dfT);
        const varThresh = -res.v;  // negative return threshold (bottom of tail)

        // Histogram of HIST data
        const bw = 0.005;
        const lo = Math.floor(Math.min(...HIST) / bw) * bw - bw;
        const hi = Math.ceil(Math.max(...HIST) / bw) * bw + bw;
        const bins = [];
        for (let b = lo; b <= hi + 1e-9; b += bw) bins.push(b);
        const counts = new Array(bins.length - 1).fill(0);
        const centers = bins.slice(0, -1).map((b, i) => (b + bins[i + 1]) / 2);
        for (const v of HIST) {
            const idx = Math.min(Math.floor((v - bins[0]) / bw), counts.length - 1);
            if (idx >= 0 && idx < counts.length) counts[idx] += 1;
        }
        const colors = centers.map(c => c <= varThresh ? cNeg : cMid);

        const traces = [{
            x: centers, y: counts, type: "bar",
            marker: { color: colors, line: { width: 0 } },
            width: bw * 0.95,
            hovertemplate: T.hist_x + ": %{x:.2%}<br>" + T.hist_y + ": %{y}<extra></extra>",
            name: "",
        }];

        const layout = {
            margin: { l: 56, r: 16, t: 56, b: 44 },
            paper_bgcolor: cBg, plot_bgcolor: cBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif", color: cText, size: 12 },
            title: { text: T.hist_title, font: { color: cText, size: 13 }, x: 0, xanchor: "left" },
            xaxis: { title: { text: T.hist_x, font: { color: cMuted, size: 11 } },
                     gridcolor: cGrid, color: cText, tickformat: ".0%" },
            yaxis: { title: { text: T.hist_y, font: { color: cMuted, size: 11 } },
                     gridcolor: cGrid, color: cText },
            shapes: [{
                type: "line", xref: "x", yref: "paper",
                x0: varThresh, x1: varThresh, y0: 0, y1: 1,
                line: { color: cAcc, width: 2.0, dash: "solid" },
            }],
            annotations: [{
                x: varThresh, y: 1.02, xref: "x", yref: "paper",
                text: T.var_marker + ": " + (varThresh*100).toFixed(2) + "%",
                showarrow: false, xanchor: "left", yanchor: "bottom",
                font: { color: cAcc, size: 11, weight: "bold" },
            }],
            showlegend: false, bargap: 0.05,
        };
        Plotly.react(HISTC, traces, layout, { displayModeBar: false, responsive: true });
    }

    function renderStats() {
        const sigmaD = volAnnual / Math.sqrt(252);
        const res1d = varCvar(method, conf, sigmaD, dfT);
        const var1d = res1d.v * portfolio;
        const cvar1d = res1d.c * portfolio;
        // 1-month VaR via square-root scaling (21 trading days)
        const var1m = res1d.v * Math.sqrt(21) * portfolio;
        const ratio = res1d.v > 0 ? res1d.c / res1d.v : 0;

        document.getElementById("vr-val-var1d").textContent = fmtUSDfull(var1d);
        document.getElementById("vr-det-var1d").textContent = pct(res1d.v) + " of NAV";
        document.getElementById("vr-val-cvar1d").textContent = fmtUSDfull(cvar1d);
        document.getElementById("vr-det-cvar1d").textContent = pct(res1d.c) + " of NAV";
        document.getElementById("vr-val-var1m").textContent = fmtUSDfull(var1m);
        document.getElementById("vr-det-var1m").textContent = pct(res1d.v * Math.sqrt(21)) + " of NAV";
        document.getElementById("vr-val-ratio").textContent = ratio.toFixed(2) + "x";
        const methodLabel = method === "normal" ? T.normal : (method === "t" ? T.t_dist + " df=" + dfT : T.hist);
        document.getElementById("vr-det-ratio").textContent = methodLabel + " · " + (conf*100).toFixed(conf >= 0.999 ? 1 : (conf >= 0.99 ? (conf===0.995?1:0) : 0)) + "%";
    }

    function render() {
        renderBarChart();
        renderHist();
        renderStats();
    }

    // -------- Wire up controls
    PV_INPUT.addEventListener("input", () => {
        const v = parseFloat(PV_INPUT.value);
        if (!isFinite(v) || v <= 0) return;
        portfolio = v;
        updatePVLabel();
        render();
    });
    VOL.addEventListener("input", () => {
        volAnnual = parseFloat(VOL.value) / 100;
        updateVolLabel();
        render();
    });
    DF.addEventListener("input", () => {
        dfT = parseInt(DF.value, 10);
        updateDFLabel();
        if (method === "t") render();
    });
    CONF_PILLS.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            CONF_PILLS.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            conf = parseFloat(btn.dataset.c);
            render();
        });
    });
    METHOD_PILLS.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            METHOD_PILLS.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            method = btn.dataset.m;
            updateDFVisible();
            render();
        });
    });

    applyI18n();
    updatePVLabel();
    updateVolLabel();
    updateDFLabel();
    updateDFVisible();
    render();

    // -------- Theme observer + postMessage resize
    const themeObserver = new MutationObserver(render);
    themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

    function reportHeight() {
        try {
            const h = Math.ceil(document.documentElement.scrollHeight);
            parent.postMessage({ type: "lesson-interactive-resize", height: h }, "*");
        } catch (e) { /* ignore */ }
    }
    if (typeof ResizeObserver !== "undefined") {
        new ResizeObserver(reportHeight).observe(document.body);
    }
    window.addEventListener("resize", reportHeight);
    setTimeout(reportHeight, 50);
    setTimeout(reportHeight, 500);
})();
</script>
</body>
</html>
