<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inflation Erosion — Interactive (Week 1)</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
html, body { margin: 0; padding: 0; background: var(--tp-bg); }
:root {
    --tp-bg: #fdfbf5;
    --tp-text: #1a2332;
    --tp-muted: #6b7280;
    --tp-border: #d6d3c4;
    --tp-card: #fdfbf5;
    --tp-line: #b71c1c;
    --tp-baseline: #5a5a5a;
    --tp-accent: #b8860b;
}
html[data-theme="dark"] .tp-root,
.tp-root[data-theme="dark"] {
    --tp-bg: #0f1724;
    --tp-text: #e6e6e6;
    --tp-muted: #9aa3b2;
    --tp-border: #2a3441;
    --tp-card: #0f1724;
    --tp-line: #ef5350;
    --tp-baseline: #b0b0b0;
}
.tp-root {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--tp-bg);
    color: var(--tp-text);
    padding: 12px;
    margin: 0;
}
.tp-money-controls {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--tp-card);
    border: 1px solid var(--tp-border);
    border-radius: 8px;
}
@media (max-width: 900px) {
    .tp-money-controls { grid-template-columns: 1fr; }
}
.tp-money-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85rem;
    color: var(--tp-muted);
}
.tp-money-row label {
    flex: 0 0 auto;
    white-space: nowrap;
    color: var(--tp-text);
    font-weight: 600;
}
.tp-money-row input[type="range"] {
    flex: 1;
    min-width: 0;
    accent-color: var(--tp-accent);
}
.tp-money-row .tp-money-value {
    flex: 0 0 auto;
    min-width: 78px;
    text-align: right;
    color: var(--tp-text);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}
.tp-chart {
    width: 100%;
    height: 420px;
    background: var(--tp-card);
    border-radius: 8px;
    border: 1px solid var(--tp-border);
}
.tp-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-top: 14px;
}
.tp-stat {
    background: var(--tp-card);
    border: 1px solid var(--tp-border);
    border-left: 4px solid var(--tp-line);
    border-radius: 8px;
    padding: 10px 12px;
}
.tp-stat .tp-stat-name {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--tp-muted);
}
.tp-stat .tp-stat-end {
    font-size: 1.3rem;
    font-weight: 700;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
}
.tp-stat .tp-stat-detail {
    font-size: 0.76rem;
    color: var(--tp-muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
}
.tp-stat .tp-stat-loss { color: #b71c1c; }
html[data-theme="dark"] .tp-stat .tp-stat-loss { color: #ef9a9a; }
.tp-caption {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--tp-muted);
    line-height: 1.45;
}
@media (max-width: 720px) {
    .tp-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}
@media (max-width: 480px) {
    .tp-money-controls { grid-template-columns: 1fr; }
    .tp-chart { height: 340px; }
}
</style>
</head>
<body>

<div class="tp-root" id="tp-root">
    <div class="tp-money-controls">
        <div class="tp-money-row">
            <label for="tp-initial" id="tp-initial-label-text">Initial value</label>
            <input type="range" id="tp-initial" min="10" max="10000" step="10" value="100">
            <span class="tp-money-value" id="tp-initial-value">$100</span>
        </div>
        <div class="tp-money-row">
            <label for="tp-start" id="tp-start-label-text">Start year</label>
            <input type="range" id="tp-start" min="1900" max="1975" step="1" value="1975">
            <span class="tp-money-value" id="tp-start-value">1975</span>
        </div>
        <div class="tp-money-row">
            <label for="tp-duration" id="tp-duration-label-text">Duration</label>
            <input type="range" id="tp-duration" min="50" max="50" step="1" value="50">
            <span class="tp-money-value" id="tp-duration-value">50 yrs</span>
        </div>
    </div>
    <div id="tp-chart" class="tp-chart"></div>
    <div class="tp-stats">
        <div class="tp-stat">
            <div class="tp-stat-name" id="tp-y0-label">Year 0 (start)</div>
            <div class="tp-stat-end" id="tp-y0-val">—</div>
            <div class="tp-stat-detail" id="tp-y0-detail">100% of original</div>
        </div>
        <div class="tp-stat">
            <div class="tp-stat-name" id="tp-y10-label">After 10 years</div>
            <div class="tp-stat-end" id="tp-y10-val">—</div>
            <div class="tp-stat-detail tp-stat-loss" id="tp-y10-loss">—</div>
        </div>
        <div class="tp-stat">
            <div class="tp-stat-name" id="tp-y25-label">After 25 years</div>
            <div class="tp-stat-end" id="tp-y25-val">—</div>
            <div class="tp-stat-detail tp-stat-loss" id="tp-y25-loss">—</div>
        </div>
        <div class="tp-stat">
            <div class="tp-stat-name" id="tp-y50-label">After 50 years</div>
            <div class="tp-stat-end" id="tp-y50-val">—</div>
            <div class="tp-stat-detail tp-stat-loss" id="tp-y50-loss">—</div>
        </div>
    </div>
    <p class="tp-caption" id="tp-caption">
        The line shows the real purchasing power of your initial cash pile
        held under the mattress, expressed in start-year dollars.
    </p>
</div>

<script>
(function () {
    // ------- Locale handling -------
    const I18N = {
        en: {
            initial:    "Initial value",
            start_year: "Start year",
            duration:   "Duration",
            year_unit:  "yrs",
            year0:      "Year 0 ({year})",
            year_after: "After {n} yrs ({year})",
            of_orig:    "100% of original",
            loss_fmt:   "−{pct}% of original",
            legend1:    "Real purchasing power",
            legend2:    "Nominal value (no inflation)",
            yaxis:      "Purchasing power (in {start} dollars)",
            xaxis:      "Year",
            hover_real: "in {start} dollars",
            caption:    "The line shows the real purchasing power of your initial cash pile held under the mattress, expressed in start-year dollars. The dotted baseline is the nominal $value — the number printed on the bills, which never changes. The gap between the two lines is the silent wealth destruction of inflation.",
        },
        hk: {
            initial:    "初始金額",
            start_year: "起始年份",
            duration:   "持有年期",
            year_unit:  "年",
            year0:      "第 0 年({year})",
            year_after: "{n} 年後({year})",
            of_orig:    "原值 100%",
            loss_fmt:   "−{pct}% 原值",
            legend1:    "實質購買力",
            legend2:    "名義價值(無通脹)",
            yaxis:      "購買力(以 {start} 年美元計)",
            xaxis:      "年份",
            hover_real: "(以 {start} 年美元計)",
            caption:    "紅線是你那筆初始現金「藏在床墊下」的實質購買力,以起始年份的美元計算。灰色虛線是名義價值 — 鈔票上印的數字,永遠不變。兩條線之間的差距,就是通脹悄悄吞掉的財富。",
        },
        tw: {
            initial:    "初始金額",
            start_year: "起始年份",
            duration:   "持有年期",
            year_unit:  "年",
            year0:      "第 0 年({year})",
            year_after: "{n} 年後({year})",
            of_orig:    "原值 100%",
            loss_fmt:   "−{pct}% 原值",
            legend1:    "實質購買力",
            legend2:    "名目價值(無通膨)",
            yaxis:      "購買力(以 {start} 年美元計)",
            xaxis:      "年份",
            hover_real: "(以 {start} 年美元計)",
            caption:    "紅線是你那筆初始現金「藏在床墊下」的實質購買力,以起始年份美元計算。灰色虛線是名目價值 — 鈔票上印的數字,永遠不變。兩條線之間的差距,就是通膨悄悄吞掉的財富。",
        },
        cn: {
            initial:    "初始金额",
            start_year: "起始年份",
            duration:   "持有年期",
            year_unit:  "年",
            year0:      "第 0 年({year})",
            year_after: "{n} 年后({year})",
            of_orig:    "原值 100%",
            loss_fmt:   "−{pct}% 原值",
            legend1:    "实质购买力",
            legend2:    "名义价值(无通胀)",
            yaxis:      "购买力(以 {start} 年美元计)",
            xaxis:      "年份",
            hover_real: "(以 {start} 年美元计)",
            caption:    "红线是你那笔初始现金「藏在床垫下」的实质购买力,以起始年份美元计算。灰色虚线是名义价值 — 钞票上印的数字,永远不变。两条线之间的差距,就是通胀悄悄吞掉的财富。",
        },
    };
    function currentLang() {
        const p = new URLSearchParams(window.location.search);
        const l = (p.get("lang") || "en").toLowerCase();
        return I18N.hasOwnProperty(l) ? l : "en";
    }
    const T = I18N[currentLang()];
    function fmt(s, vars) {
        return s.replace(/\{(\w+)\}/g, function (_, k) {
            return vars && vars[k] != null ? vars[k] : "";
        });
    }

    // US CPI YoY change (decimal), 1900-2025 — same series as the
    // course/image/week01_inflation_purchasing_power.py generator.
    const CPI = [
        0.012,0.012,0.000,0.012,0.000,0.000,0.000,0.048,-0.011,0.000,
        0.046,0.000,0.022,0.011,0.011,0.011,0.076,0.178,0.180,0.146,
        0.156,-0.105,-0.061,0.018,0.000,0.024,0.000,-0.012,-0.012,0.000,
       -0.023,-0.089,-0.103,-0.052,0.035,0.026,0.010,0.037,-0.020,-0.013,
        0.007,0.050,0.109,0.060,0.016,0.023,0.085,0.144,0.081,-0.012,
        0.013,0.079,0.019,0.008,0.007,-0.004,0.015,0.033,0.027,0.009,
        0.015,0.011,0.012,0.012,0.013,0.016,0.029,0.031,0.042,0.055,
        0.057,0.044,0.032,0.062,0.110,0.091,0.057,0.065,0.076,0.113,
        0.135,0.103,0.062,0.032,0.043,0.035,0.019,0.037,0.041,0.048,
        0.054,0.042,0.030,0.030,0.026,0.028,0.030,0.023,0.016,0.022,
        0.034,0.028,0.016,0.023,0.027,0.034,0.032,0.029,0.038,-0.004,
        0.016,0.032,0.021,0.015,0.016,0.001,0.013,0.021,0.024,0.018,
        0.012,0.047,0.080,0.041,0.029,0.026
    ];
    const FIRST_YEAR = 1900;
    const LAST_YEAR = 2025;

    function cumInflation(startYear, endYear) {
        let f = 1.0;
        for (let y = startYear; y < endYear; y++) {
            f *= (1 + CPI[y - FIRST_YEAR]);
        }
        return f;
    }
    function purchasingPower(initial, startYear, endYear) {
        return initial / cumInflation(startYear, endYear);
    }

    const ROOT = document.getElementById("tp-root");
    const CHART = document.getElementById("tp-chart");
    const INITIAL_SLIDER = document.getElementById("tp-initial");
    const START_SLIDER = document.getElementById("tp-start");
    const DURATION_SLIDER = document.getElementById("tp-duration");
    const INITIAL_VALUE = document.getElementById("tp-initial-value");
    const START_VALUE = document.getElementById("tp-start-value");
    const DURATION_VALUE = document.getElementById("tp-duration-value");

    function clampDuration() {
        const start = parseInt(START_SLIDER.value, 10);
        const maxDuration = LAST_YEAR - start;
        DURATION_SLIDER.max = String(maxDuration);
        if (parseFloat(DURATION_SLIDER.value) > maxDuration) {
            DURATION_SLIDER.value = String(maxDuration);
        }
    }

    function fmtMoney(v) {
        if (!isFinite(v)) return "—";
        if (v >= 1e6) return "$" + (v / 1e6).toFixed(2) + "M";
        if (v >= 1e3) return "$" + (v / 1e3).toFixed(1) + "K";
        if (v >= 100) return "$" + v.toFixed(0);
        return "$" + v.toFixed(2);
    }
    function fmtMoneyShort(v) {
        if (v >= 1e6) return "$" + (v / 1e6).toFixed(1) + "M";
        if (v >= 1e3) return "$" + (v / 1e3).toFixed(1) + "K";
        return "$" + v.toLocaleString();
    }
    function fmtLoss(v) {
        return fmt(T.loss_fmt, { pct: v.toFixed(1) });
    }

    function getCssVar(name) {
        return getComputedStyle(ROOT).getPropertyValue(name).trim();
    }
    function darkMode() {
        return document.documentElement.getAttribute("data-theme") === "dark";
    }

    function render() {
        clampDuration();
        const initial = parseFloat(INITIAL_SLIDER.value);
        const start = parseInt(START_SLIDER.value, 10);
        const duration = parseInt(DURATION_SLIDER.value, 10);
        const end = start + duration;

        // Build the year-by-year purchasing power series.
        const xs = [];
        const ys = [];
        for (let y = start; y <= end; y++) {
            xs.push(y);
            ys.push(purchasingPower(initial, start, y));
        }

        const colorLine = getCssVar("--tp-line");
        const colorBaseline = getCssVar("--tp-baseline");
        const colorText = getCssVar("--tp-text");
        const colorMuted = getCssVar("--tp-muted");
        const colorGrid = darkMode() ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";
        const colorBg = getCssVar("--tp-card");

        const data = [
            {
                x: xs, y: ys,
                name: T.legend1,
                type: "scatter", mode: "lines",
                line: { color: colorLine, width: 2.8 },
                hovertemplate: "%{x}<br><b>%{y:$,.2f}</b> " + fmt(T.hover_real, {start: start}) + "<extra></extra>",
            },
            {
                x: [start, end], y: [initial, initial],
                name: T.legend2,
                type: "scatter", mode: "lines",
                line: { color: colorBaseline, width: 1.2, dash: "dot" },
                hoverinfo: "skip",
                opacity: 0.7,
            },
        ];
        const layout = {
            margin: { l: 60, r: 28, t: 12, b: 44 },
            paper_bgcolor: colorBg,
            plot_bgcolor: colorBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif", color: colorText, size: 12 },
            xaxis: {
                title: { text: T.xaxis, font: { color: colorMuted, size: 11 } },
                gridcolor: colorGrid,
                color: colorText,
                tickformat: "d",
                range: [start - 0.5, end + 0.5],
            },
            yaxis: {
                title: { text: fmt(T.yaxis, {start: start}),
                         font: { color: colorMuted, size: 11 } },
                gridcolor: colorGrid,
                color: colorText,
                tickformat: "$,.0f",
                range: [0, initial * 1.1],
            },
            legend: {
                orientation: "h",
                x: 0.5, xanchor: "center",
                y: 1.06, yanchor: "bottom",
                font: { size: 11 },
                bgcolor: "rgba(0,0,0,0)",
            },
            hovermode: "x unified",
        };
        Plotly.react(CHART, data, layout, { displayModeBar: false, responsive: true });

        // Update controls + stats
        INITIAL_VALUE.textContent = fmtMoneyShort(initial);
        START_VALUE.textContent = String(start);
        DURATION_VALUE.textContent = duration + " " + T.year_unit;

        function updateStat(years, valElId, lossElId, labelElId) {
            const targetYear = start + years;
            const pp = purchasingPower(initial, start, targetYear);
            const lossPct = (1 - pp / initial) * 100;
            document.getElementById(valElId).textContent = fmtMoney(pp);
            const lossEl = document.getElementById(lossElId);
            if (lossEl) lossEl.textContent = fmtLoss(lossPct);
            const labelEl = document.getElementById(labelElId);
            if (labelEl && years > 0) {
                labelEl.textContent = fmt(T.year_after, {n: years, year: targetYear});
            }
        }
        document.getElementById("tp-y0-val").textContent = fmtMoney(initial);
        document.getElementById("tp-y0-label").textContent = fmt(T.year0, {year: start});
        document.getElementById("tp-y0-detail").textContent = T.of_orig;
        // Two intermediate stats spread evenly across the chosen window so
        // the milestones make sense whether duration is 50 or 125 years.
        const m1 = Math.max(1, Math.round(duration / 3));
        const m2 = Math.max(m1 + 1, Math.round(duration * 2 / 3));
        updateStat(m1, "tp-y10-val", "tp-y10-loss", "tp-y10-label");
        updateStat(m2, "tp-y25-val", "tp-y25-loss", "tp-y25-label");
        updateStat(duration, "tp-y50-val", "tp-y50-loss", "tp-y50-label");
    }

    // Apply locale-aware static labels (slider/caption).
    function applyI18n() {
        document.getElementById("tp-initial-label-text").textContent = T.initial;
        document.getElementById("tp-start-label-text").textContent = T.start_year;
        document.getElementById("tp-duration-label-text").textContent = T.duration;
        document.getElementById("tp-caption").textContent = T.caption;
    }
    applyI18n();

    INITIAL_SLIDER.addEventListener("input", render);
    START_SLIDER.addEventListener("input", render);
    DURATION_SLIDER.addEventListener("input", render);

    const themeObserver = new MutationObserver(render);
    themeObserver.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["data-theme"],
    });

    render();

    // Tell the parent how tall this content is so the embedding iframe can
    // size itself exactly — no white bar below, no inner scrollbar.
    function reportHeight() {
        try {
            var h = Math.ceil(document.documentElement.scrollHeight);
            parent.postMessage({ type: 'lesson-interactive-resize', height: h }, '*');
        } catch (e) { /* sandboxed or top-level — ignore */ }
    }
    if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(reportHeight).observe(document.body);
    }
    window.addEventListener("resize", reportHeight);
    setTimeout(reportHeight, 50);
    setTimeout(reportHeight, 500);   // catch async Plotly layout
})();
</script>

</body>
</html>
