<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FX Lab — Interactive (Week 22)</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
<style>
html, body { margin: 0; padding: 0; background: var(--fx-bg); }
:root {
    --fx-bg: #fdfbf5;
    --fx-text: #1a2332;
    --fx-muted: #6b7280;
    --fx-border: #d6d3c4;
    --fx-card: #fdfbf5;
    --fx-pos: #2e7d32;
    --fx-neg: #b71c1c;
    --fx-mid: #0d47a1;
    --fx-accent: #b8860b;
}
html[data-theme="dark"] .fx-root,
.fx-root[data-theme="dark"] {
    --fx-bg: #0f1724;
    --fx-text: #e6e6e6;
    --fx-muted: #9aa3b2;
    --fx-border: #2a3441;
    --fx-card: #0f1724;
    --fx-pos: #66bb6a;
    --fx-neg: #ef5350;
    --fx-mid: #5a8dee;
    --fx-accent: #d4a017;
}
.fx-root {
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--fx-bg);
    color: var(--fx-text);
    padding: 12px;
    margin: 0;
}
.fx-presets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
}
.fx-presets button {
    border: 1px solid var(--fx-border);
    background: var(--fx-card);
    color: var(--fx-muted);
    padding: 6px 12px;
    border-radius: 999px;
    font: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.fx-presets button:hover { color: var(--fx-text); border-color: var(--fx-accent); }
.fx-presets button.active {
    background: var(--fx-accent);
    color: #fff;
    border-color: var(--fx-accent);
}
.fx-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
    padding: 12px;
    background: var(--fx-card);
    border: 1px solid var(--fx-border);
    border-radius: 8px;
}
.fx-slider-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--fx-muted);
}
.fx-slider-wrap .fx-row {
    display: flex;
    align-items: center;
    gap: 10px;
}
.fx-slider-wrap input[type="range"] {
    flex: 1;
    accent-color: var(--fx-accent);
}
.fx-slider-wrap .fx-val {
    white-space: nowrap;
    color: var(--fx-text);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-width: 64px;
    text-align: right;
}
.fx-stats {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 12px;
}
.fx-stat {
    background: var(--fx-card);
    border: 1px solid var(--fx-border);
    border-left: 4px solid var(--fx-muted);
    border-radius: 8px;
    padding: 10px 12px;
}
.fx-stat.fx-stat-unh { border-left-color: var(--fx-mid); }
.fx-stat.fx-stat-hed { border-left-color: var(--fx-accent); }
.fx-stat.fx-stat-diff { border-left-color: var(--fx-pos); }
.fx-stat.fx-stat-diff.fx-stat-loss { border-left-color: var(--fx-neg); }
.fx-stat .fx-stat-name {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--fx-muted);
}
.fx-stat .fx-stat-val {
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
}
.fx-stat .fx-stat-detail {
    font-size: 0.78rem;
    color: var(--fx-muted);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
}
.fx-chart {
    width: 100%;
    height: 380px;
    background: var(--fx-card);
    border-radius: 8px;
    border: 1px solid var(--fx-border);
}
.fx-caption {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--fx-muted);
    line-height: 1.45;
}
@media (max-width: 640px) {
    .fx-controls { grid-template-columns: 1fr; }
    .fx-stats { grid-template-columns: 1fr; }
    .fx-chart { height: 340px; }
}
</style>
</head>
<body>

<div class="fx-root" id="fx-root">
    <div class="fx-presets" id="fx-presets" role="tablist" aria-label="FX scenarios">
        <button type="button" data-preset="plaza"  >1985 Plaza Accord</button>
        <button type="button" data-preset="eur02"  >2002 EUR Creation Era</button>
        <button type="button" data-preset="bid14" class="active">2014 USD Bid</button>
        <button type="button" data-preset="reset25">2025 USD Reset</button>
        <button type="button" data-preset="custom" >Custom</button>
    </div>
    <div class="fx-controls">
        <div class="fx-slider-wrap">
            <span id="fx-label-usd">USD strengthening, % per year</span>
            <div class="fx-row">
                <input type="range" id="fx-usd" min="-10" max="10" step="0.5" value="5">
                <span class="fx-val" id="fx-usd-val">+5.0%</span>
            </div>
        </div>
        <div class="fx-slider-wrap">
            <span id="fx-label-loc">Foreign equity local-currency return, % per year</span>
            <div class="fx-row">
                <input type="range" id="fx-loc" min="-20" max="30" step="0.5" value="8">
                <span class="fx-val" id="fx-loc-val">+8.0%</span>
            </div>
        </div>
    </div>
    <div class="fx-stats">
        <div class="fx-stat fx-stat-unh">
            <div class="fx-stat-name" id="fx-name-unh">Unhedged USD return</div>
            <div class="fx-stat-val" id="fx-val-unh">—</div>
            <div class="fx-stat-detail" id="fx-det-unh">—</div>
        </div>
        <div class="fx-stat fx-stat-hed">
            <div class="fx-stat-name" id="fx-name-hed">Hedged USD return</div>
            <div class="fx-stat-val" id="fx-val-hed">—</div>
            <div class="fx-stat-detail" id="fx-det-hed">—</div>
        </div>
        <div class="fx-stat fx-stat-diff" id="fx-stat-diff">
            <div class="fx-stat-name" id="fx-name-diff">Hedge advantage</div>
            <div class="fx-stat-val" id="fx-val-diff">—</div>
            <div class="fx-stat-detail" id="fx-det-diff">—</div>
        </div>
    </div>
    <div id="fx-chart" class="fx-chart"></div>
    <p class="fx-caption" id="fx-caption">
        Hedge cost assumed at 1.0% per year (interest-rate differential plus operational drag).
    </p>
</div>

<script>
(function () {
    const I18N = {
        en: {
            label_usd:    "USD strengthening, % per year",
            label_loc:    "Foreign equity local-currency return, % per year",
            name_unh:     "Unhedged USD return",
            name_hed:     "Hedged USD return",
            name_diff:    "Hedge advantage",
            det_unh:      "(1+local) x (1-USDstr) - 1",
            det_hed:      "local - hedge_cost",
            det_diff_pos: "Hedged outperforms by this much.",
            det_diff_neg: "Unhedged outperforms by this much.",
            x_axis:       "Strategy",
            y_axis:       "USD return for the year",
            x_unh:        "Unhedged",
            x_hed:        "Hedged",
            x_local:      "Local-currency",
            preset_plaza: "1985 Plaza Accord",
            preset_eur:   "2002 EUR Creation Era",
            preset_bid:   "2014 USD Bid",
            preset_reset: "2025 USD Reset",
            preset_custom:"Custom",
            caption:      "Move the sliders to see how a foreign equity year translates into your USD brokerage statement. Hedge cost is fixed at 1.0% per year, a typical mid-2020s figure for developed-market hedging. Unhedged USD return uses the compounded formula (1+local) x (1-USDstrengthen) - 1; hedged equals local-currency return minus hedge cost. Per SOUL #16, the structural answer for most US-based retail readers is to size EXUS small (5-15%) and prefer the hedged variant -- this lab shows you why.",
            scenario_lbl: "Scenario",
        },
        hk: {
            label_usd:    "美元升幅,每年百分比",
            label_loc:    "外國股票本地貨幣回報,每年百分比",
            name_unh:     "未對沖美元回報",
            name_hed:     "對沖美元回報",
            name_diff:    "對沖優勢",
            det_unh:      "(1+本地) x (1-美元升幅) - 1",
            det_hed:      "本地 - 對沖成本",
            det_diff_pos: "對沖跑贏未對沖的幅度。",
            det_diff_neg: "未對沖跑贏對沖的幅度。",
            x_axis:       "策略",
            y_axis:       "當年美元回報",
            x_unh:        "未對沖",
            x_hed:        "對沖",
            x_local:      "本地貨幣",
            preset_plaza: "1985 廣場協議",
            preset_eur:   "2002 歐元誕生期",
            preset_bid:   "2014 美元買盤",
            preset_reset: "2025 美元重置",
            preset_custom:"自訂",
            caption:      "拖動滑桿,看看一個外國股票年份如何在你的美元證券月結單上呈現。對沖成本固定為每年 1.0%,這是 2020 年代中期對發達市場對沖的典型數字。未對沖美元回報使用複利公式 (1+本地) x (1-美元升幅) - 1;對沖回報等於本地貨幣回報減對沖成本。根據 SOUL #16,大多數美國本土散戶的結構性答案是把 EXUS 控制在小比例(5-15%)且偏好對沖版本──這個實驗讓你看到原因。",
            scenario_lbl: "情境",
        },
        tw: {
            label_usd:    "美元升幅,每年百分比",
            label_loc:    "外國股票本地貨幣報酬,每年百分比",
            name_unh:     "未避險美元報酬",
            name_hed:     "避險美元報酬",
            name_diff:    "避險優勢",
            det_unh:      "(1+本地) x (1-美元升幅) - 1",
            det_hed:      "本地 - 避險成本",
            det_diff_pos: "避險勝過未避險的幅度。",
            det_diff_neg: "未避險勝過避險的幅度。",
            x_axis:       "策略",
            y_axis:       "當年美元報酬",
            x_unh:        "未避險",
            x_hed:        "避險",
            x_local:      "本地貨幣",
            preset_plaza: "1985 廣場協議",
            preset_eur:   "2002 歐元誕生期",
            preset_bid:   "2014 美元買盤",
            preset_reset: "2025 美元重置",
            preset_custom:"自訂",
            caption:      "拖動滑桿,看看一個外國股票年份如何在你的美元券商月結單上呈現。避險成本固定為每年 1.0%,這是 2020 年代中期已開發市場避險的典型數字。未避險美元報酬使用複利公式 (1+本地) x (1-美元升幅) - 1;避險回報等於本地貨幣報酬減避險成本。根據 SOUL #16,大多數美國本土散戶的結構性答案是把 EXUS 控制在小比例(5-15%)且偏好避險版本──這個實驗讓你看到原因。",
            scenario_lbl: "情境",
        },
        cn: {
            label_usd:    "美元升幅,每年百分比",
            label_loc:    "外国股票本地货币回报,每年百分比",
            name_unh:     "未对冲美元回报",
            name_hed:     "对冲美元回报",
            name_diff:    "对冲优势",
            det_unh:      "(1+本地) x (1-美元升幅) - 1",
            det_hed:      "本地 - 对冲成本",
            det_diff_pos: "对冲超越未对冲的幅度。",
            det_diff_neg: "未对冲超越对冲的幅度。",
            x_axis:       "策略",
            y_axis:       "当年美元回报",
            x_unh:        "未对冲",
            x_hed:        "对冲",
            x_local:      "本地货币",
            preset_plaza: "1985 广场协议",
            preset_eur:   "2002 欧元诞生期",
            preset_bid:   "2014 美元买盘",
            preset_reset: "2025 美元重置",
            preset_custom:"自定义",
            caption:      "拖动滑杆,看看一个外国股票年份如何在你的美元券商月结单上呈现。对冲成本固定为每年 1.0%,这是 2020 年代中期发达市场对冲的典型数字。未对冲美元回报使用复利公式 (1+本地) x (1-美元升幅) - 1;对冲回报等于本地货币回报减对冲成本。根据 SOUL #16,大多数美国本土散户的结构性答案是把 EXUS 控制在小比例(5-15%)并偏好对冲版本──这个实验让你看到原因。",
            scenario_lbl: "情境",
        },
    };

    function currentLang() {
        const p = new URLSearchParams(window.location.search);
        const l = (p.get("lang") || "en").toLowerCase();
        return I18N.hasOwnProperty(l) ? l : "en";
    }
    const T = I18N[currentLang()];

    // Scenario presets: [usd_strengthening_pct, foreign_local_pct]
    // - 1985 Plaza: USD weakening ~-15%/yr post-Plaza; European equities strong ~+12%
    // - 2002 EUR creation era: USD weakening ~-8%/yr; EAFE local ~-10% (post-dotcom slump)
    // - 2014 USD bid: USD strengthening ~+8%/yr; foreign equity local ~+5%
    // - 2025 reset: USD weakening ~-7%/yr; foreign equity local ~+8% (post-tariff EU + Japan rotation)
    const PRESETS = {
        plaza:    { usd: -15, loc:  12 },
        eur02:    { usd:  -8, loc: -10 },
        bid14:    { usd:   8, loc:   5 },
        reset25:  { usd:  -7, loc:   8 },
        custom:   null,
    };
    const HEDGE_COST = 0.01;   // 1% per year

    const ROOT       = document.getElementById("fx-root");
    const CHART      = document.getElementById("fx-chart");
    const PRESETS_EL = document.getElementById("fx-presets");
    const USD_SL     = document.getElementById("fx-usd");
    const LOC_SL     = document.getElementById("fx-loc");
    const USD_VAL    = document.getElementById("fx-usd-val");
    const LOC_VAL    = document.getElementById("fx-loc-val");
    const STAT_DIFF  = document.getElementById("fx-stat-diff");

    let usd = 8;   // % per year; +ve = USD strengthens
    let loc = 5;   // % per year; foreign local-currency equity return

    function pct(v) {
        if (!isFinite(v)) return "—";
        const sign = v >= 0 ? "+" : "";
        return sign + (v * 100).toFixed(1) + "%";
    }
    function getCssVar(name) {
        return getComputedStyle(ROOT).getPropertyValue(name).trim();
    }
    function darkMode() {
        return document.documentElement.getAttribute("data-theme") === "dark";
    }

    function compute() {
        const u = usd / 100;
        const l = loc / 100;
        // Foreign currency depreciates by `u` (because USD strengthens by u).
        // Unhedged USD = (1+local) * (1-u) - 1
        const unh = (1 + l) * (1 - u) - 1;
        // Hedged USD ~= local - hedge_cost
        const hed = l - HEDGE_COST;
        return { unh, hed, local: l, diff: hed - unh };
    }

    function render() {
        const r = compute();

        const colorUnh   = getCssVar("--fx-mid");
        const colorHed   = getCssVar("--fx-accent");
        const colorLocal = getCssVar("--fx-muted");
        const colorPos   = getCssVar("--fx-pos");
        const colorNeg   = getCssVar("--fx-neg");
        const colorText  = getCssVar("--fx-text");
        const colorMuted = getCssVar("--fx-muted");
        const colorGrid  = darkMode() ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.07)";
        const colorBg    = getCssVar("--fx-card");

        const xs = [T.x_local, T.x_unh, T.x_hed];
        const ys = [r.local, r.unh, r.hed];
        const colors = [colorLocal, colorUnh, colorHed];
        const labels = ys.map(pct);

        const traces = [{
            x: xs,
            y: ys,
            type: "bar",
            marker: { color: colors, line: { width: 0 } },
            text: labels,
            textposition: "outside",
            textfont: { color: colorText, size: 13, family: "Segoe UI, Helvetica, Arial, sans-serif" },
            cliponaxis: false,
            hovertemplate: "%{x}<br>" + T.y_axis + ": %{y:.2%}<extra></extra>",
        }];

        const yMax = Math.max(0.05, ...ys.map(v => v + 0.04));
        const yMin = Math.min(-0.05, ...ys.map(v => v - 0.04));

        const layout = {
            margin: { l: 64, r: 24, t: 24, b: 50 },
            paper_bgcolor: colorBg,
            plot_bgcolor: colorBg,
            font: { family: "Segoe UI, Helvetica, Arial, sans-serif", color: colorText, size: 12 },
            bargap: 0.4,
            xaxis: {
                title: { text: T.x_axis, font: { color: colorMuted, size: 11 } },
                color: colorText,
                gridcolor: colorGrid,
                zerolinecolor: colorMuted,
            },
            yaxis: {
                title: { text: T.y_axis, font: { color: colorMuted, size: 11 } },
                gridcolor: colorGrid,
                zerolinecolor: colorMuted,
                color: colorText,
                tickformat: ".0%",
                range: [yMin, yMax],
            },
            shapes: [{
                type: "line", xref: "paper", yref: "y",
                x0: 0, x1: 1, y0: 0, y1: 0,
                line: { color: colorMuted, width: 1 },
            }],
            showlegend: false,
            hovermode: "closest",
        };

        Plotly.react(CHART, traces, layout, {
            displayModeBar: false,
            responsive: true,
        });

        document.getElementById("fx-val-unh").textContent = pct(r.unh);
        document.getElementById("fx-det-unh").textContent = T.det_unh;
        document.getElementById("fx-val-hed").textContent = pct(r.hed);
        document.getElementById("fx-det-hed").textContent = T.det_hed;
        document.getElementById("fx-val-diff").textContent = pct(r.diff);
        document.getElementById("fx-det-diff").textContent =
            r.diff >= 0 ? T.det_diff_pos : T.det_diff_neg;
        STAT_DIFF.classList.toggle("fx-stat-loss", r.diff < 0);
    }

    function applyVals() {
        USD_VAL.textContent = (usd >= 0 ? "+" : "") + usd.toFixed(1) + "%";
        LOC_VAL.textContent = (loc >= 0 ? "+" : "") + loc.toFixed(1) + "%";
    }

    function setActivePreset(name) {
        PRESETS_EL.querySelectorAll("button").forEach(b =>
            b.classList.toggle("active", b.dataset.preset === name)
        );
    }

    function applyPreset(name) {
        const p = PRESETS[name];
        if (!p) { setActivePreset("custom"); return; }
        usd = p.usd;
        loc = p.loc;
        USD_SL.value = String(usd);
        LOC_SL.value = String(loc);
        applyVals();
        render();
        setActivePreset(name);
    }

    USD_SL.addEventListener("input", () => {
        usd = parseFloat(USD_SL.value);
        applyVals();
        setActivePreset("custom");
        render();
    });
    LOC_SL.addEventListener("input", () => {
        loc = parseFloat(LOC_SL.value);
        applyVals();
        setActivePreset("custom");
        render();
    });
    PRESETS_EL.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => applyPreset(btn.dataset.preset));
    });

    function applyI18n() {
        document.getElementById("fx-label-usd").textContent = T.label_usd;
        document.getElementById("fx-label-loc").textContent = T.label_loc;
        document.getElementById("fx-name-unh").textContent  = T.name_unh;
        document.getElementById("fx-name-hed").textContent  = T.name_hed;
        document.getElementById("fx-name-diff").textContent = T.name_diff;
        document.getElementById("fx-caption").textContent   = T.caption;
        const map = {
            plaza:   T.preset_plaza,
            eur02:   T.preset_eur,
            bid14:   T.preset_bid,
            reset25: T.preset_reset,
            custom:  T.preset_custom,
        };
        PRESETS_EL.querySelectorAll("button").forEach(b => {
            const k = b.dataset.preset;
            if (map[k]) b.textContent = map[k];
        });
    }

    applyI18n();
    applyVals();
    render();

    function reportHeight() {
        try {
            var h = Math.ceil(document.documentElement.scrollHeight);
            parent.postMessage({ type: 'lesson-interactive-resize', height: h }, '*');
        } catch (e) { /* ignore */ }
    }
    if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(reportHeight).observe(document.body);
    }
    window.addEventListener('resize', reportHeight);
    setTimeout(reportHeight, 50);
    setTimeout(reportHeight, 500);

    const themeObserver = new MutationObserver(render);
    themeObserver.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["data-theme"],
    });
})();
</script>

</body>
</html>
